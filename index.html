<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Ponyforge</title>
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
    <link rel="canonical" href="https://ponyforge.com/" />
    <meta name="description" content="A small paddock. Six horses, twelve hats." />
    <meta property="og:title" content="Ponyforge" />
    <meta property="og:description" content="A small paddock. Six horses, twelve hats." />
    <meta property="og:url" content="https://ponyforge.com/" />
    <meta property="og:image" content="https://ponyforge.com/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#f3efe6" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip" href="#paddock">Skip to paddock</a>

    <main id="paddock" class="paddock" aria-label="Paddock — six horses, twelve hats">

      <div class="sky" aria-hidden="true"></div>
      <div class="weather-fx" aria-hidden="true">
        <svg class="weather-fx__drizzle" width="100%" height="100%" preserveAspectRatio="none" aria-hidden="true">
          <defs>
            <pattern id="pf-drizzle" patternUnits="userSpaceOnUse" width="14" height="14" patternTransform="rotate(70)">
              <line x1="0" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1"/>
            </pattern>
          </defs>
          <rect width="100%" height="100%" fill="url(#pf-drizzle)"/>
        </svg>
        <div class="weather-fx__fog" aria-hidden="true"></div>
        <div class="weather-fx__aurora" aria-hidden="true"></div>
      </div>

      <button id="weatherChip" class="weather-chip" type="button" aria-label="Weather — click to cycle">
        <span class="weather-chip__txt">clear</span>
      </button>

      <div class="stamp">
        <span class="stamp__name">Ponyforge</span>
        <span class="stamp__sub">studbook &amp; millinery · MMXXVI</span>
      </div>

      <div class="compass compass--n" aria-hidden="true"><span>N</span></div>
      <div class="compass compass--e" aria-hidden="true"><span>E</span></div>
      <div class="compass compass--w" aria-hidden="true"><span>W</span></div>
      <div class="compass compass--s" aria-hidden="true"><span>S</span></div>

      <div class="fold" aria-hidden="true">
        <span>fig. 1</span>
        <span>the paddock — eight metres by five</span>
      </div>

      <button id="recall" class="recall" type="button" aria-label="Recall all horses to their starting positions">recall</button>
      <button id="mute" class="mute" type="button" aria-label="Toggle sound" aria-pressed="false">
        <span class="mute__on">sound on</span>
        <span class="mute__off">sound off</span>
      </button>

      <p class="affordance" id="affordance" aria-hidden="true">
        <span class="affordance__key">G</span>
        <span class="affordance__sep">·</span>
        <span>procession</span>
      </p>

      <p class="hint" id="hint" aria-live="polite">
        <span>click a horse</span>
        <span class="hint__sep">·</span>
        <span>pick a hat from the ring</span>
        <span class="hint__sep">·</span>
        <span>drag anywhere</span>
      </p>

      <div class="herd" id="herd"></div>

      <div class="ring" id="ring" role="dialog" aria-label="Choose a hat" aria-hidden="true">
        <div class="ring__center">
          <span class="ring__caption">millinery</span>
          <span class="ring__sub" id="ringTarget">—</span>
        </div>
        <button class="ring__hat" data-hat="🎩" data-key="1" aria-label="Topper (1)"><span class="g">🎩</span><span class="k">1</span></button>
        <button class="ring__hat" data-hat="🌼" data-key="2" aria-label="Daisy (2)"><span class="g">🌼</span><span class="k">2</span></button>
        <button class="ring__hat" data-hat="🧢" data-key="3" aria-label="Cap (3)"><span class="g">🧢</span><span class="k">3</span></button>
        <button class="ring__hat" data-hat="👑" data-key="4" aria-label="Crown (4)"><span class="g">👑</span><span class="k">4</span></button>
        <button class="ring__hat" data-hat="🕶️" data-key="5" aria-label="Shades (5)"><span class="g">🕶️</span><span class="k">5</span></button>
        <button class="ring__hat" data-hat="🪩" data-key="6" aria-label="Disco (6)"><span class="g">🪩</span><span class="k">6</span></button>
        <button class="ring__hat" data-hat="🏳️‍🌈" data-key="7" aria-label="Pride (7)"><span class="g">🏳️‍🌈</span><span class="k">7</span></button>
        <button class="ring__hat" data-hat="🏳️‍⚧️" data-key="8" aria-label="Trans (8)"><span class="g">🏳️‍⚧️</span><span class="k">8</span></button>
        <button class="ring__hat" data-hat="💋" data-key="9" aria-label="Kiss (9)"><span class="g">💋</span><span class="k">9</span></button>
        <button class="ring__hat" data-hat="🦋" data-key="0" aria-label="Papillon (0)"><span class="g">🦋</span><span class="k">0</span></button>
        <button class="ring__hat" data-hat="✨" data-key="-" aria-label="Sparkle (-)"><span class="g">✨</span><span class="k">-</span></button>
        <button class="ring__hat" data-hat="🥀" data-key="=" aria-label="Rose (=)"><span class="g">🥀</span><span class="k">=</span></button>
      </div>

      <div class="procession" id="procession" aria-hidden="true">
        <p class="procession__caption" aria-live="polite">
          <span class="procession__name"></span>
          <span class="procession__bio"></span>
        </p>
        <p class="procession__counter" id="processionCounter"></p>
      </div>

      <p class="witness" id="witness" aria-hidden="true">(witnessed · MMXXVI)</p>
      <p class="witness--aurora" id="witnessAurora" aria-hidden="true">(saw aurora)</p>

      <div class="toast" id="toast" aria-live="polite"></div>

    </main>

    <script src="./script.js"></script>
  </body>
</html>
