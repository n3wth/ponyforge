<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Ponyforge</title>
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
    <link rel="canonical" href="https://ponyforge.com/" />
    <meta name="description" content="A small paddock. Six horses. Stack hats, draw, name, share." />
    <meta property="og:title" content="Ponyforge" />
    <meta property="og:description" content="A small paddock. Six horses. Stack hats, draw, name, share." />
    <meta property="og:url" content="https://ponyforge.com/" />
    <meta property="og:image" content="https://ponyforge.com/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#f3efe6" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip" href="#paddock">Skip to paddock</a>

    <main id="paddock" class="paddock" aria-label="Paddock — sandbox">

      <canvas id="ink" class="ink" aria-hidden="true"></canvas>

      <div class="stamp">
        <span class="stamp__name">Ponyforge</span>
        <span class="stamp__sub">studbook &amp; millinery · MMXXVI</span>
      </div>

      <div class="compass compass--n" aria-hidden="true"><span>N</span></div>
      <div class="compass compass--e" aria-hidden="true"><span>E</span></div>
      <div class="compass compass--w" aria-hidden="true"><span>W</span></div>
      <div class="compass compass--s" aria-hidden="true"><span>S</span></div>

      <div class="fold" aria-hidden="true">
        <span>fig. 1</span>
        <span>the paddock — eight metres by five</span>
      </div>

      <div class="tags" aria-label="paddock controls">
        <button id="modeSwitch" class="tag" type="button" aria-label="Cycle equipment slot">
          <span class="tag__k">slot</span>
          <span class="tag__v" id="modeLabel">hat</span>
        </button>
        <button id="saveBtn" class="tag" type="button" aria-label="Export scene as PNG (Cmd/Ctrl+S)">
          <span class="tag__k">⌘S</span>
          <span class="tag__v">save</span>
        </button>
        <button id="shareBtn" class="tag" type="button" aria-label="Copy share link (Cmd/Ctrl+Shift+S)">
          <span class="tag__k">⌘⇧S</span>
          <span class="tag__v">share</span>
        </button>
        <button id="recall" class="tag" type="button" aria-label="Recall horses to home">
          <span class="tag__k">R</span>
          <span class="tag__v">recall</span>
        </button>
        <button id="tidyBtn" class="tag tag--warn" type="button" aria-label="Reset paddock — confirms once">
          <span class="tag__k">×</span>
          <span class="tag__v" id="tidyLabel">tidy up</span>
        </button>
      </div>

      <p class="hint" id="hint" aria-live="polite">
        <span>tap horse · pick equipment</span>
        <span class="hint__sep">·</span>
        <span>tab cycles slot</span>
        <span class="hint__sep">·</span>
        <span>shift-drag draws</span>
        <span class="hint__sep">·</span>
        <span>alt-drag clones</span>
      </p>

      <div class="herd" id="herd"></div>

      <div class="ring" id="ring" role="dialog" aria-label="Choose equipment" aria-hidden="true">
        <div class="ring__center">
          <span class="ring__caption" id="ringCaption">millinery</span>
          <span class="ring__sub" id="ringTarget">—</span>
        </div>
      </div>

      <div class="toast" id="toast" aria-live="polite"></div>

    </main>

    <script src="./script.js"></script>
  </body>
</html>
