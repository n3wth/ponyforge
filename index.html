<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ponyforge</title>
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
    <link rel="canonical" href="https://ponyforge.com/" />
    <meta name="description" content="Put hats on ponies." />
    <meta property="og:title" content="Ponyforge" />
    <meta property="og:description" content="Put hats on ponies." />
    <meta property="og:url" content="https://ponyforge.com/" />
    <meta property="og:image" content="https://ponyforge.com/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <h1>Ponyforge</h1>

      <div class="hats" id="hats">
        <button class="hat" data-hat="🎩" aria-checked="true">🎩</button>
        <button class="hat" data-hat="🌼">🌼</button>
        <button class="hat" data-hat="🧢">🧢</button>
        <button class="hat" data-hat="👑">👑</button>
        <button class="hat" data-hat="🕶️">🕶️</button>
        <button class="hat" data-hat="🪩">🪩</button>
        <button class="hat" data-hat="🏳️‍🌈">🏳️‍🌈</button>
        <button class="hat" data-hat="🏳️‍⚧️">🏳️‍⚧️</button>
        <button class="hat" data-hat="💋">💋</button>
        <button class="hat" data-hat="🦋">🦋</button>
        <button class="hat" data-hat="✨">✨</button>
        <button class="hat" data-hat="🥀">🥀</button>
      </div>

      <div class="pasture" id="pasture"></div>

      <div class="stable" id="stable">
        <button class="pony" draggable="true">
          <span class="hat-slot">🏳️‍🌈</span>
          <img src="./assets/pony-iris.png" alt="Iris" />
        </button>
        <button class="pony" draggable="true">
          <span class="hat-slot">💋</span>
          <img src="./assets/pony-vesper.png" alt="Vesper" />
        </button>
        <button class="pony" draggable="true">
          <span class="hat-slot">🦋</span>
          <img src="./assets/pony-onyx.png" alt="Onyx" />
        </button>
        <button class="pony" draggable="true">
          <span class="hat-slot">✨</span>
          <img src="./assets/pony-prism.png" alt="Prism" />
        </button>
        <button class="pony" draggable="true">
          <span class="hat-slot">🏳️‍⚧️</span>
          <img src="./assets/pony-sable.png" alt="Sable" />
        </button>
        <button class="pony" draggable="true">
          <span class="hat-slot">🥀</span>
          <img src="./assets/pony-femme.png" alt="Femme" />
        </button>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
